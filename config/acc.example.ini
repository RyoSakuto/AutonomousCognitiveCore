[acc]
# ACC Beispielkonfiguration fuer das Repo.
# Diese Datei nicht direkt personalisieren, sondern z. B. kopieren nach:
#   config/acc.local.ini
# oder:
#   config/acc.ini
# Beide lokalen Dateien sind per .gitignore ausgeschlossen.

# Basis
db_path = data/acc.db
max_cycles = 6
operating_mode = balanced

# Lokales LLM
llm_provider = openai_compatible
llm_endpoint = http://localhost:1234
llm_model = mistralai/ministral-3-14b-reasoning
llm_timeout_sec = 180

# Multi-Model-Routing
llm_planner_model = mistralai/ministral-3-14b-reasoning
llm_reviewer_model = openai/gpt-oss-20b
llm_chat_model = openai/gpt-oss-20b

# RAM-/CPU-freundliche Defaults
llm_auto_discover = true
llm_auto_load = false
llm_prefer_loaded = true
llm_load_timeout_sec = 120
llm_switch_budget = 1

# Memory / Embeddings
embedding_provider = hash
embedding_model = nomic-embed-text
embedding_endpoint = http://localhost:11434/api/embeddings
embedding_dimensions = 96
memory_retrieval_k = 4
memory_candidate_window = 400
memory_min_score = 0.15

# Task-Core
task_funnel_enabled = true
task_execution_enabled = true
task_funnel_batch_size = 2
task_execution_batch_size = 1
task_human_feedback_gate = false

# Dienste
structured_logging_enabled = false
health_server_enabled = false

# Beispiel fuer eine lokale private Ueberschreibung:
# llm_endpoint = http://192.168.0.56:1234
# llm_model = dein/modell
# llm_api_key = falls_noetig
